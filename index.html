<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDo List App</title>
</head>
<body>
    <div class="content">
        <h2 class="title">ToDo List</h2>
        <form class="content_from">
            <input type="text" class="form_input" placeholder="add new todo" required>
            <button class="form_btn" type="submit">Add</button>
        </form>

        <div class="todo_list">
            <div class="list_item">
                <div class="list_info">
                    <input type="checkbox" type="checkbox">
                    <p class="todo">Lorem, ipsum dolor.</p>
                </div>
                <button class="remove_btn">
                    <img src="img/trash.svg" width="20" height="20" alt="trash-icon">
                </button>
            </div>
        </div>


    </div>

    <script src="./app.js"></script>
</body>
</html>
